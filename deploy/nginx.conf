server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    charset utf-8;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    location / {
        try_files $uri $uri/ =404;
    }

    location = /index.html {
        if ($request_uri ~ ^/index\.html(\?.*)?$) {
            return 301 /;
        }

        expires -1;
        try_files $uri =404;
    }

    location = /casa-dei-cigni.html {
        return 301 /casa-dei-cigni/;
    }

    location = /la-casetta.html {
        return 301 /la-casetta/;
    }

    location = /olivetta-omgeving.html {
        return 301 /olivetta-omgeving/;
    }

    location = /prijzen-beschikbaarheid.html {
        return 301 /prijzen-beschikbaarheid/;
    }

    location = /bereikbaarheid-contact.html {
        return 301 /bereikbaarheid-contact/;
    }

    location ~* \.html$ {
        expires -1;
        try_files $uri =404;
    }

    location /assets/ {
        access_log off;
        expires 30d;
        try_files $uri =404;
    }

    location ~ /\. {
        deny all;
    }
}
